<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>初始設定 — 開始造局</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'Noto Sans TC', 'Segoe UI', sans-serif;
  background: #f0f4ff;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.card {
  background: #fff;
  border-radius: 20px;
  box-shadow: 0 4px 24px rgba(91,155,213,0.12);
  padding: 48px 40px;
  max-width: 480px;
  width: 100%;
}
.logo {
  text-align: center;
  margin-bottom: 8px;
  font-size: 40px;
}
h1 {
  text-align: center;
  font-size: 24px;
  font-weight: 800;
  color: #1e293b;
  margin-bottom: 4px;
}
.subtitle {
  text-align: center;
  color: #64748b;
  font-size: 14px;
  margin-bottom: 32px;
}
.field {
  margin-bottom: 20px;
}
.field label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: #475569;
  margin-bottom: 6px;
}
.field input {
  width: 100%;
  padding: 12px 16px;
  border: 1.5px solid #e2e8f0;
  border-radius: 10px;
  font-size: 15px;
  color: #1e293b;
  transition: border-color 0.2s;
  outline: none;
}
.field input:focus {
  border-color: #5B9BD5;
  box-shadow: 0 0 0 3px rgba(91,155,213,0.1);
}
.field .hint {
  font-size: 12px;
  color: #94a3b8;
  margin-top: 4px;
}
.btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #5B9BD5, #7B68EE);
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 12px;
  transition: opacity 0.2s;
}
.btn:hover { opacity: 0.9; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.error {
  background: #fef2f2;
  color: #dc2626;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 16px;
  display: none;
}
@media (max-width: 500px) {
  .card { padding: 32px 24px; }
}
</style>
</head>
<body>
<div class="card">
  <div class="logo">&#127919;</div>
  <h1>歡迎使用 AI 造局術</h1>
  <p class="subtitle">先完成基本設定，就能開始你的線上課程事業</p>

  <div class="error" id="error"></div>

  <form id="setupForm">
    <div class="field">
      <label>課程名稱</label>
      <input type="text" name="siteName" placeholder="例：AI 造局術" required>
      <div class="hint">顯示在網站標題和頁面上</div>
    </div>
    <div class="field">
      <label>品牌名稱</label>
      <input type="text" name="brandName" placeholder="例：knowu 國際顧問" required>
      <div class="hint">顯示在頁尾和結帳頁</div>
    </div>
    <div class="field">
      <label>講師名稱</label>
      <input type="text" name="instructorName" placeholder="例：張老師" required>
    </div>
    <div class="field">
      <label>管理員密碼</label>
      <input type="password" name="adminPassword" placeholder="設定後台登入密碼" required minlength="4">
      <div class="hint">用於登入後台管理介面，請牢記</div>
    </div>
    <button type="submit" class="btn" id="submitBtn">開始造局</button>
  </form>
</div>

<script>
const form = document.getElementById('setupForm');
const errorEl = document.getElementById('error');
const submitBtn = document.getElementById('submitBtn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorEl.style.display = 'none';
  submitBtn.disabled = true;
  submitBtn.textContent = '設定中...';

  const data = Object.fromEntries(new FormData(form));

  try {
    const res = await fetch('/setup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    const result = await res.json();
    if (result.success) {
      window.location.href = '/admin';
    } else {
      errorEl.textContent = result.message || '設定失敗，請重試';
      errorEl.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = '開始造局';
    }
  } catch (err) {
    errorEl.textContent = '網路錯誤，請重試';
    errorEl.style.display = 'block';
    submitBtn.disabled = false;
    submitBtn.textContent = '開始造局';
  }
});
</script>
</body>
</html>
