apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: AI 造局術
spec:
  description: 一鍵部署完整線上課程自動化系統（課程網站 + LINE Bot + 資料庫）
  icon: https://raw.githubusercontent.com/whitedragon080316/aibuild/main/icon.png
  tags:
    - Website
    - Bot
  coverImage: https://raw.githubusercontent.com/whitedragon080316/aibuild/main/cover.png
  readme: |
    ## AI 造局術 — 線上課程自動化部署模板

    一個人 + AI = 一間公司。這套模板包含：

    - **課程平台**（LP + 結帳 + 金流 + 課程觀看 + 進度追蹤）
    - **LINE Bot**（報名 + 提醒 + 追單 + AI 回覆）
    - **MongoDB**（資料庫）

    ### 部署超簡單

    只要填你的品牌名就能部署。LINE、金流、廣告等設定，部署後到 `/admin` 後台慢慢設定就好。

    ### 部署後你得到

    ```
    課程網站（LP + 結帳 + 課程頁）
    LINE Bot（報名 + 追單 + AI 助理）
    管理後台（/admin，所有設定都在這裡）
    ```

  variables:
    - key: SITE_NAME
      type: STRING
      name: 課程名稱
      description: 你的課程名稱（之後可以在 /admin 改）

  services:
    # === MongoDB ===
    - name: mongodb
      icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/mongodb.svg
      template: PREBUILT
      spec:
        source:
          image: mongo:7
        ports:
          - id: database
            port: 27017
            type: TCP
        volumes:
          - id: data
            dir: /data/db
        env:
          MONGO_INITDB_ROOT_USERNAME:
            default: root
          MONGO_INITDB_ROOT_PASSWORD:
            default: ${PASSWORD}

    # === 課程平台 Web ===
    - name: web
      icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/nodejs.svg
      template: PREBUILT
      dependencies:
        - mongodb
      spec:
        source:
          image: ghcr.io/whitedragon080316/aibuild/web:latest
        ports:
          - id: web
            port: 3000
            type: HTTP
        env:
          SITE_NAME:
            default: ${SITE_NAME}
          PUBLIC_BASE_URL:
            default: ""
          MONGODB_URI:
            default: mongodb://root:${PASSWORD}@${MONGODB_HOST}:${MONGODB_PORT}
            expose: false
          PORT:
            default: "3000"

    # === LINE Bot ===
    - name: bot
      icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/nodejs.svg
      template: PREBUILT
      dependencies:
        - mongodb
      spec:
        source:
          image: ghcr.io/whitedragon080316/aibuild/bot:latest
        ports:
          - id: bot
            port: 3000
            type: HTTP
        env:
          SITE_NAME:
            default: ${SITE_NAME}
          WEB_URL:
            default: ""
          MONGODB_URI:
            default: mongodb://root:${PASSWORD}@${MONGODB_HOST}:${MONGODB_PORT}
            expose: false
          PORT:
            default: "3000"

  instructions:
    - type: TEXT
      title: 部署完成後
      content: |
        1. 到 Zeabur Dashboard 幫 web 和 bot 各綁一個網域
        2. 打開你的課程網站網址/admin → 設定管理員密碼
        3. 在後台設定品牌、LINE Bot、金流、廣告追蹤（跟著課程進度一步一步填）
